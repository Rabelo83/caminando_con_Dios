<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Caminando con Dios</title>
  
  <meta name="description" content="Un devocional diario para edificar tu vida.">
  <meta name="theme-color" content="#0B0F19">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./caminando_con_dios_icon.png">
  
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  
  <div id="app">
    <!-- Header -->
    <header class="top-nav glass-panel">
      <div class="nav-content">
        <h1 class="logo font-outfit">Caminando con <span class="text-gold">Dios</span></h1>
        <button id="btn-index" class="icon-btn" aria-label="Menu" title="Menu">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="content-area">
      <!-- Devotional View -->
      <article id="view-daily" class="view active">
        <div class="devotional-card glass-panel" id="devotional-container">
          <p class="loading-text">Cargando devocional...</p>
        </div>
        
        <div class="controls glass-panel">
          <button id="btn-prev" class="btn-ghost" disabled>← Anterior</button>
          <div class="streak-indicator">
            <span class="streak-icon">🔥</span>
            <span id="streak-count">Día 1</span>
          </div>
          <button id="btn-next" class="btn-primary">Siguiente →</button>
        </div>
      </article>

      <!-- Index View -->
      <section id="view-index" class="view hidden">
        <div class="index-header">
          <h2 class="font-outfit">Todos los Devocionales</h2>
          <button class="btn-ghost" id="btn-back-daily">Volver</button>
        </div>
        <div id="index-list" class="index-grid">
           <!-- Populated by JS -->
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.error('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
