<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Caminando con Dios</title>
  
  <meta name="description" content="Un devocional diario para edificar tu vida.">
  <meta name="theme-color" content="#030712">
  
  <!-- Fonts: Inter for UI, Playfair for main reading text, Outfit for brand/accents -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./caminando_con_dios_icon.png">
  <link rel="apple-touch-icon" href="./caminando_con_dios_icon.png">
  
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  
  <!-- Atmospheric Animated Background -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">
    <!-- Header -->
    <header class="top-nav">
      <div class="nav-content fade-in-down">
        <h1 class="logo font-outfit">Caminando con <span class="text-gold glow">Dios</span></h1>
        <button id="btn-index" class="icon-btn" aria-label="Menu" title="Menu">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="content-area fade-in-up" role="main">
      <!-- Devotional View -->
      <article id="view-daily" class="view active" role="region" aria-label="Devocional Diario">
        <div class="devotional-scroll-wrapper">
           <div class="devotional-card glass-panel" id="devotional-container" aria-live="polite">
             <div class="skeleton-loader font-playfair" style="opacity:0.5;">Cargando revelación...</div>
           </div>
        </div>
        
        <div class="bottom-dock glass-panel fade-in-up delay-2" role="navigation" aria-label="Controles del Devocional">
          <button id="btn-prev" class="btn-icon circle-btn" disabled aria-label="Devocional Anterior">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
          </button>
          <div class="streak-wrapper">
            <div class="streak-indicator" aria-live="polite">
              <span class="streak-icon" aria-hidden="true">✨</span>
              <span id="streak-count" class="font-outfit">Día 1</span>
            </div>
            <div class="progress-bar-bg" aria-hidden="true"><div class="progress-bar-fill" id="progress-fill"></div></div>
          </div>
          <button id="btn-next" class="btn-primary pill-btn" aria-label="Siguiente Devocional">
            Siguiente
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </article>

      <!-- Index View -->
      <section id="view-index" class="view hidden" role="region" aria-label="Índice de Devocionales">
        <div class="index-header glass-panel sticky-header">
          <h2 class="font-playfair">El Viaje</h2>
          <button class="btn-ghost pill-btn" id="btn-back-daily" aria-label="Regresar al devocional actual">Regresar</button>
        </div>
        <div id="index-list" class="index-grid" role="list">
           <!-- Populated by JS -->
        </div>
        <footer class="app-footer">
          <p class="font-outfit">Escrito por <strong>Pastor Javier Alvarez</strong></p>
          <p class="font-inter text-sm"><a href="https://www.lanuevacosecha.com/" target="_blank" rel="noopener noreferrer">Iglesia La Nueva Cosecha</a></p>
        </footer>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => {
          console.error('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>
</html>
